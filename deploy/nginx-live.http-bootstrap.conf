# Temporary HTTP-only bootstrap (before certbot)
# Used when cert does not exist yet.

upstream hermes_trade1 {
    server 127.0.0.1:40001;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name live.hermesbro.cloud;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location ~* ^/(chat|message|pause|resume|configure|proactive)(/|$) {
        default_type application/json;
        return 403 '{"ok":false,"error":"Forbidden: control endpoints are not public","readOnly":true}';
    }
    location ^~ /wallet {
        default_type application/json;
        return 403 '{"ok":false,"error":"Forbidden: wallet control is not public","readOnly":true}';
    }
    location = /status {
        default_type application/json;
        return 403 '{"ok":false,"error":"Use /api/dashboard (public)","readOnly":true}';
    }

    location ^~ /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass http://hermes_trade1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 25s;
    }

    location / {
        limit_req zone=general burst=40 nodelay;
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass http://hermes_trade1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    access_log /var/log/nginx/live.hermesbro.cloud.access.log;
    error_log  /var/log/nginx/live.hermesbro.cloud.error.log;
}
