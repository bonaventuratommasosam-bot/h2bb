# Hermes live showcase — public READ-ONLY reverse proxy
# Upstream stays on 127.0.0.1:40001 (never bind bot to 0.0.0.0)
#
# DNS: live.hermesbro.cloud  A  194.146.12.219
# Install via: scripts/enable-public-showcase.sh

upstream hermes_trade1 {
    server 127.0.0.1:40001;
    keepalive 8;
}

# HTTP → HTTPS (+ ACME)
server {
    listen 80;
    listen [::]:80;
    server_name live.hermesbro.cloud;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name live.hermesbro.cloud;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/live.hermesbro.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/live.hermesbro.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://s3.tradingview.com https://www.tradingview.com https://s.tradingview.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://s3.tradingview.com https://s.tradingview.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://s3.tradingview.com https://*.tradingview.com https://www.tradingview.com; frame-src https://s.tradingview.com https://www.tradingview.com https://*.tradingview.com; worker-src 'self' blob:; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;

    proxy_hide_header X-Powered-By;

    # --- HARD DENY: control surface ---
    location ~* ^/(chat|message|pause|resume|configure|proactive)(/|$) {
        default_type application/json;
        return 403 '{"ok":false,"error":"Forbidden: control endpoints are not public","readOnly":true}';
    }
    location ^~ /wallet {
        default_type application/json;
        return 403 '{"ok":false,"error":"Forbidden: wallet control is not public","readOnly":true}';
    }
    location = /status {
        default_type application/json;
        return 403 '{"ok":false,"error":"Use /api/dashboard (public)","readOnly":true}';
    }

    # --- Public read-only API ---
    location ^~ /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass http://hermes_trade1;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # X-Real-IP / X-Forwarded-For = $remote_addr only (no client spoof)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 25s;
        proxy_connect_timeout 5s;
        add_header Cache-Control "no-store" always;
    }

    location = /health {
        limit_req zone=general burst=30 nodelay;
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass http://hermes_trade1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static UI ---
    location / {
        limit_req zone=general burst=40 nodelay;
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass http://hermes_trade1;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    access_log /var/log/nginx/live.hermesbro.cloud.access.log;
    error_log  /var/log/nginx/live.hermesbro.cloud.error.log;
}
